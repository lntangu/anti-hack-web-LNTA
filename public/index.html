<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MATRIX V16.4 | SECURE</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background:#000; color:#0f0; font-family:monospace; margin:0; overflow:hidden; }
        #matrix { position:fixed; top:0; left:0; z-index:-1; opacity:0.3; }
        .container { max-width:800px; margin:20px auto; border:1px solid #0f0; background:rgba(0,10,0,0.9); display: flex; flex-direction: column; height: 95vh; }
        #chat-box { flex: 1; overflow-y:auto; padding:20px; display:flex; flex-direction:column-reverse; }
        .input-area { padding:15px; border-top:1px solid #0f0; display:flex; gap:10px; }
        input { flex:1; background:#000; color:#0f0; border:1px solid #0f0; padding:10px; outline:none; }
        button { background:#0f0; color:#000; border:none; padding:0 20px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div style="padding:10px; border-bottom:1px solid #0f0; font-size:12px; display:flex; justify-content:space-between;">
            <span>V16.4 SECURE SYSTEM</span>
            <span>CPU:<span id="cpu">0</span>% | RAM:<span id="ram">0</span>GB | ONLINE:<span id="on">0</span></span>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="m" placeholder="Message or /cmd pass..." maxlength="150">
            <button id="b">SEND</button>
        </div>
    </div>
    <script>
        const socket = io();
        const chat = document.getElementById('chat-box');
        
        socket.on('sync_chat', (data) => {
            chat.innerHTML = data.map(m => `
                <div style="margin-bottom:10px;">
                    <span style="color:#555; font-size:10px;">${m.name} [${m.time}]:</span><br>
                    <span style="color:${m.name==='SYSTEM'?'#ff0':'#0f0'}; border:1px solid #111; padding:4px; display:inline-block;">${m.text}</span>
                </div>
            `).join('');
        });

        socket.on('sys_stats', (s) => {
            document.getElementById('cpu').innerText = s.cpu;
            document.getElementById('ram').innerText = s.ram;
            document.getElementById('on').innerText = s.online;
        });

        function send() {
            const i = document.getElementById('m');
            if(i.value) { socket.emit('chat message', {name: localStorage.getItem('nick')||'User', msg: i.value}); i.value=''; }
        }
        document.getElementById('b').onclick = send;
        document.getElementById('m').onkeypress = (e) => e.key==='Enter'&&send();

        // Matrix Effect
        const c = document.getElementById('matrix'); const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const d = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            x.fillStyle = "rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle = "#0f0"; x.font = "16px monospace";
            d.forEach((y, i) => {
                x.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) d[i]=0; d[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>

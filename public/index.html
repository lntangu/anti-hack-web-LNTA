<script>
    let lastBlocked = 0;
    function fetchRealData() {
        fetch('/api/stats')
        .then(res => res.json())
        .then(data => {
            document.getElementById('on').innerText = data.online;
            document.getElementById('total-v').innerText = data.totalVisitors;
            document.getElementById('myip').innerText = data.clientIP;
            document.getElementById('cpu').innerText = data.cpu;
            document.getElementById('ram').innerText = data.ram;
            
            const blockedElem = document.getElementById('blocked');
            blockedElem.innerText = data.attackBlocked;

            // Nếu số vụ chặn tăng lên -> Nhấp nháy cảnh báo
            if (data.attackBlocked > lastBlocked) {
                document.body.style.backgroundColor = "#200";
                setTimeout(() => document.body.style.backgroundColor = "#000", 100);
                lastBlocked = data.attackBlocked;
            }

            if(data.logs.length > 0) {
                document.getElementById('logs').innerHTML = data.logs.map(l => 
                    `<div style="color:#f00; border-bottom:1px solid #300;">[${l.time}] ALERT: ${l.ip} - ${l.reason}</div>`
                ).join('');
            }
        });
    }
    setInterval(fetchRealData, 1000); // Tăng tốc độ cập nhật lên 1s để theo kịp DDoS
</script>

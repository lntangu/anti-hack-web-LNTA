<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MATRIX OS | COMMAND CENTER</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        /* Khung viền Neon tỏa sáng */
        .monitor { width: 90%; max-width: 1000px; border: 2px solid #0f0; padding: 30px; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 30px #0f0; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        /* Chỉ số sáng rực */
        .card { border: 1px solid #0f0; padding: 20px; text-align: center; background: rgba(0, 40, 0, 0.2); position: relative; }
        .val { font-size: 55px; color: #fff; font-weight: bold; text-shadow: 0 0 15px #0f0; }
        .danger { border-color: #f00; color: #f00; box-shadow: inset 0 0 10px #f00; }
        .danger .val { color: #fff; text-shadow: 0 0 15px #f00; }
        /* Hiệu ứng tia quét Radar */
        .scanline { width: 100%; height: 5px; background: rgba(0, 255, 0, 0.1); position: absolute; top: 0; left: 0; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        /* Bảng Log */
        .logs { height: 80px; overflow: hidden; font-size: 13px; border-top: 1px solid #040; margin-top: 20px; padding-top: 10px; color: #88ff88; }
        h1 { text-align: center; letter-spacing: 15px; text-transform: uppercase; margin: 0; font-size: 26px; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>
    <div class="monitor">
        <div class="scanline"></div>
        <h1>System Live Status</h1>
        <div class="grid">
            <div class="card">
                <div style="letter-spacing: 2px;">REAL-TIME ONLINE</div>
                <div class="val" id="on">1</div>
            </div>
            <div class="card danger">
                <div style="letter-spacing: 2px;">DDOS INTERCEPTED</div>
                <div class="val" id="bl">0</div>
            </div>
            <div class="card">
                <div>SERVER LOAD</div>
                <div style="margin-top: 10px;">CPU: <span id="cp" style="color:#fff">5.5%</span></div>
                <div>RAM: <span id="rm" style="color:#fff">12%</span></div>
            </div>
            <div class="card">
                <div style="font-size: 12px;">THREAT LOGS</div>
                <div id="log-box" class="logs">Scanning for malicious packets...</div>
            </div>
        </div>
    </div>
    <script>
        setInterval(() => {
            fetch('/api/stats').then(r => r.json()).then(d => {
                document.getElementById('on').innerText = d.online;
                document.getElementById('bl').innerText = d.blocked;
                document.getElementById('cp').innerText = d.cpu + '%';
                document.getElementById('rm').innerText = d.ram + '%';
                if(d.blocked > 0) {
                    const box = document.getElementById('log-box');
                    box.innerHTML = `[${new Date().toLocaleTimeString()}] ALERT: CHAOS DETECTED...<br>` + box.innerHTML;
                }
            }).catch(() => {});
        }, 1000);
    </script>
</body>
</html>

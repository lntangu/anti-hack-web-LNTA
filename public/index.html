<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MATRIX OS | SECURITY SHIELD</title>
    <style>
        body { background:#000; color:#0f0; font-family:monospace; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; }
        #monitor { width:85%; max-width:1000px; border:2px solid #0f0; padding:25px; background:rgba(0,15,0,0.9); box-shadow:0 0 30px #0f0; }
        .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:20px; margin-top:20px; }
        .card { border:1px solid #0f0; padding:20px; position:relative; }
        .val { font-size:45px; color:#fff; text-shadow:0 0 10px #0f0; }
        .alert { color:#f00; border-color:#f00; box-shadow:0 0 15px #f00; }
        #logs { font-size:12px; height:80px; overflow-y:auto; color:#ff4444; border-top:1px solid #333; margin-top:10px; }
    </style>
</head>
<body>
    <div id="monitor">
        <h1 style="text-align:center; text-transform:uppercase; letter-spacing:10px;">System Live Status</h1>
        <div class="grid">
            <div class="card">
                <div>REAL-TIME TRAFFIC</div>
                <div class="val" id="on_val">0</div>
                <div style="font-size:10px">Status: <span id="status_val">Checking...</span></div>
            </div>
            <div class="card alert" id="firewall_card">
                <div style="color:#f00">DDOS INTERCEPTED</div>
                <div class="val" id="blocked_val" style="color:#f00">0</div>
                <div style="font-size:10px">Target: <span id="my_ip_val" style="color:#ff0">...</span></div>
            </div>
            <div class="card">
                <div>HARDWARE LOAD</div>
                <div>CPU: <span id="cpu_val">0</span>%</div>
                <div>RAM: <span id="ram_val">0</span>%</div>
            </div>
            <div class="card">
                <div>THREAT LOGS</div>
                <div id="logs">Listening for packets...</div>
            </div>
        </div>
    </div>

    <script>
        function update() {
            fetch('/api/stats')
            .then(res => res.json())
            .then(d => {
                document.getElementById('on_val').innerText = d.online;
                document.getElementById('blocked_val').innerText = d.blocked;
                document.getElementById('my_ip_val').innerText = d.ip;
                document.getElementById('cpu_val').innerText = d.cpu;
                document.getElementById('ram_val').innerText = d.ram;
                document.getElementById('status_val').innerText = d.status;

                if(d.logs && d.logs.length > 0) {
                    document.getElementById('logs').innerHTML = d.logs.map(l => 
                        `<div>[${l.time}] ALERT: ${l.ip} - ${l.type}</div>`
                    ).join('');
                }
            })
            .catch(() => {
                document.body.style.backgroundColor = "#200"; // Cảnh báo đỏ khi server sập
            });
        }
        setInterval(update, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MATRIX OS | ULTIMATE DEFENSE</title>
    <style>
        body { background:#000; color:#0f0; font-family:'Courier New', monospace; margin:0; overflow:hidden; }
        .container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
        .monitor { width:80%; border:2px solid #0f0; padding:30px; background:rgba(0,20,0,0.8); box-shadow: 0 0 20px #0f0; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px; }
        .card { border:1px solid #0f0; padding:15px; text-align:center; }
        .val { font-size:50px; font-weight:bold; color:#fff; }
        .warn { color:#f00 !important; border-color:#f00 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="monitor">
            <h2 style="letter-spacing:15px; text-align:center;">SYSTEM DEFENSE OVERVIEW</h2>
            <div class="grid">
                <div class="card">
                    <div>REAL-TIME ONLINE</div>
                    <div class="val" id="on_val">0</div>
                </div>
                <div class="card" id="firewall_box">
                    <div style="color:#f00">CHAOS BLOCKED</div>
                    <div class="val" id="blocked_val" style="color:#f00">0</div>
                </div>
                <div class="card">
                    <div>SERVER HEALTH</div>
                    <div>CPU: <span id="cpu_val">0</span>% | RAM: <span id="ram_val">0</span>%</div>
                </div>
                <div class="card">
                    <div>LAST INCIDENT</div>
                    <div id="log_val" style="font-size:12px; margin-top:10px;">Waiting...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function refresh() {
            fetch('/api/stats')
            .then(res => res.json())
            .then(d => {
                document.getElementById('on_val').innerText = d.online;
                document.getElementById('blocked_val').innerText = d.blocked;
                document.getElementById('cpu_val').innerText = d.cpu;
                document.getElementById('ram_val').innerText = d.ram;
                document.getElementById('log_val').innerText = `[${d.lastThreat.time}] ${d.lastThreat.type}`;
                
                if(d.blocked > 100) document.getElementById('firewall_box').classList.add('warn');
            }).catch(() => {});
        }
        setInterval(refresh, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MATRIX OS | IMMORTAL</title>
    <style>
        body { background:#000; color:#0f0; font-family:monospace; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; }
        .monitor { width:80%; border:1px solid #0f0; padding:20px; box-shadow:0 0 20px #0f0; text-align:center; }
        .val { font-size:50px; color:#fff; display:block; margin:10px 0; }
        .danger { color:#f00; }
    </style>
</head>
<body>
    <div class="monitor">
        <h2>DEFENSE SYSTEM V3</h2>
        <div id="stat-board">
            ONLINE: <span id="on_val" class="val">0</span>
            <div class="danger">BLOCKED: <span id="blocked_val" class="val">0</span></div>
            STATUS: <b id="status_val">LOADING...</b>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const d = await res.json();
                
                // Fix lỗi null bằng cách kiểm tra element
                const onEl = document.getElementById('on_val');
                const blEl = document.getElementById('blocked_val');
                const stEl = document.getElementById('status_val');

                if (onEl) onEl.innerText = d.online;
                if (blEl) blEl.innerText = d.blocked;
                if (stEl) {
                    stEl.innerText = d.status;
                    stEl.style.color = d.status === "CRITICAL" ? "red" : "#0f0";
                }
            } catch (e) {
                console.log("Server đang quá tải...");
            }
        }
        setInterval(fetchStats, 1000);
    </script>
</body>
</html>
